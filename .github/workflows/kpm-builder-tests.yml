name: tests

on:
  push:
    paths:
      - 'tools/**'
      - 'scripts/**'
      - 'axioms/**'
      - 'clusters/**'
      - 'evidence/**'
      - 'operators/**'
      - '.github/workflows/kpm-builder-tests.yml'
  pull_request:
    paths:
      - 'tools/**'
      - 'scripts/**'
      - 'axioms/**'
      - 'clusters/**'
      - 'evidence/**'
      - 'operators/**'
      - '.github/workflows/kpm-builder-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e 'tools/package-research[dev]'
          pip install -e 'tools/kpm-builder[dev]'
      - name: Doctrine lint (the standard validates itself)
        run: python scripts/doctrine_lint.py .
      - name: Doctrine lint tests
        run: pytest scripts/tests -q
      - name: package-research tests
        run: pytest tools/package-research/tests -q
      - name: kpm-builder tests
        run: pytest tools/kpm-builder/tests -q
