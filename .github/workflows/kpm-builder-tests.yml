name: kpm-builder tests

on:
  push:
    paths:
      - 'tools/kpm-builder/**'
      - 'tools/package-research/**'
      - '.github/workflows/kpm-builder-tests.yml'
  pull_request:
    paths:
      - 'tools/kpm-builder/**'
      - 'tools/package-research/**'
      - '.github/workflows/kpm-builder-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/kpm-builder/requirements.txt -r tools/kpm-builder/requirements-dev.txt
          pip install -e tools/package-research
      - name: Run tests
        run: PYTHONPATH=tools/kpm-builder:tools/package-research/src pytest tools/kpm-builder/tests -q
